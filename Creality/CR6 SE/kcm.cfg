[mcu cp_kcm]
#This line needs to be changed to the serial path of the KCM.
#Under the devices tab, look for the "path by id" that statrts "/dev/serial/by-id/usb-kcm_stm32f103xe"
serial: /dev/serial/by-id/usb-kcm_stm32f103xe_xxxxxxxxxxxx
restart_method: command
baud: 250000


[duplicate_pin_override]
pins: cp_kcm:PC4,cp_kcm:PC5,cp_kcm:PC10, cp_kcm:PC12,cp_kcm:PC11



[temperature_sensor cp_kcm_temp]
sensor_type: temperature_mcu
sensor_mcu: cp_kcm
min_temp: -100
max_temp: 900

[gcode_macro T_ALL]
gcode:
    SYNC_EXTRUDER_MOTION EXTRUDER=ex1 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex2 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex3 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex4 MOTION_QUEUE=extruder
    {% if printer.configfile.settings['mcu cp_ecm_1'] is defined %}
    SYNC_EXTRUDER_MOTION EXTRUDER=ex5 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex6 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex7 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex8 MOTION_QUEUE=extruder
    {% endif %}
    {% if printer.configfile.settings['mcu cp_ecm_2'] is defined %}
    SYNC_EXTRUDER_MOTION EXTRUDER=ex9 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex10 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex11 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex12 MOTION_QUEUE=extruder
    {% endif %}
    {% if printer.configfile.settings['mcu cp_ecm_3'] is defined %}
    SYNC_EXTRUDER_MOTION EXTRUDER=ex13 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex14 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex15 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex16 MOTION_QUEUE=extruder
    {% endif %}
    {% if printer.configfile.settings['mcu cp_ecm_4'] is defined %}
    SYNC_EXTRUDER_MOTION EXTRUDER=ex17 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex18 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex19 MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=ex20 MOTION_QUEUE=extruder
    {% endif %}


